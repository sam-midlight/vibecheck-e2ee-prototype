    <path d="M 0 90 C -140 -20, -160 -140, -70 -140 C -30 -140, 0 -110, 0 -80 C 0 -110, 30 -140, 70 -140 C 160 -140, 140 -20, 0 90 Z" fill="url(#heart)"/>
