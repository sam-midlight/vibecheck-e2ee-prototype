      <stop offset="0%" stop-color="#fde1f1"/>
      <stop offset="60%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <radialGradient id="heart" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#fecaca" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0.95"/>
